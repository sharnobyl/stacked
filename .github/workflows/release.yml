name: Release
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build universal app bundle
        run: ./Scripts/bundle.sh --universal
      - name: Zip
        run: cd build && zip -ry Stacked-${{ github.ref_name }}.zip Stacked.app
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Stacked-${{ github.ref_name }}.zip
          generate_release_notes: true
